status:
  scope: >
    All results of the paper: the introduction's Theorems 1.1-1.6 and every
    numbered result of sections 2-4 -- the algorithm deciding upper bounds on
    asymptotic rank over computable fields, Zariski-closed sublevel sets and
    semicontinuity of admissible functionals, well-ordering of asymptotic
    rank and of every spectral point, Euclidean closedness over the complex
    numbers, the tensor-to-matrix subrank bound, and the geometric
    characterization of discreteness from below -- together with the
    prerequisites these rest on (computable fields after Rabin, the
    Strassen-preorder / asymptotic-spectrum duality machinery after the
    Wigderson-Zuiddam survey, Baire/Mumford density, Kraft curve existence).
    The main results are restated in AsymptoticTensorRankSemicontinuity/Main.lean.
  sorry_count: 0
  sorry_in_definitions: 0
  axioms: ["propext", "Classical.choice", "Quot.sound"]
  main_results:
    - declaration: "Semicontinuity.computablePred_asympRank_le_uniform"
      file: "AsymptoticTensorRankSemicontinuity/AlgorithmUniform.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.isZariskiClosed_asympRank_sublevel"
      file: "AsymptoticTensorRankSemicontinuity/Algorithm.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.sublevel_zariski_closed"
      file: "AsymptoticTensorRankSemicontinuity/ZariskiSublevel.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.asympRank_values_wellOrdered"
      file: "AsymptoticTensorRankSemicontinuity/ZariskiSublevel.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.asympSpectrum_values_wellOrdered"
      file: "AsymptoticTensorRankSemicontinuity/SpectrumWellOrdered.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.asympRank_values_euclidean_closed"
      file: "AsymptoticTensorRankSemicontinuity/EuclideanClosed.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.asympSpectrum_values_euclidean_closed"
      file: "AsymptoticTensorRankSemicontinuity/EuclideanClosed.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.subrankPair_prod_ge_flatRank"
      file: "AsymptoticTensorRankSemicontinuity/MaxRankBound.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.minCut_flatRank_le_asympSubrank"
      file: "AsymptoticTensorRankSemicontinuity/AsymptoticSubrank/Main.lean"
      sorry_count: 0
    - declaration: "Semicontinuity.asympRank_discreteFromBelow_iff"
      file: "AsymptoticTensorRankSemicontinuity/DiscreteFromBelow.lean"
      sorry_count: 0

automation:
  methods:
    - method: "agent"
      models: ["claude-opus-4-8"]
      framework: "Claude Code"
      tool_setup: "Claude Code (planning, implementation, verification), dispatching OpenAI Codex (codex exec) for specified proof implementations and independent audits; human direction and review throughout."
      cost:
        wall_time: "~19 active development days"
  notes: >
    Source-driven formalization: every definition and theorem is traced
    line-by-line to the paper or to the secondary sources listed above.

fidelity:
  divergences: >
    None: the main theorems are stated as in the paper, with no added
    hypotheses.

review:
  status: "agent-reviewed, author-reviewed"
  notes: >
    Reviewed by paper co-author J. Zuiddam. Independent agent audits (statement
    faithfulness against the paper, axiom usage of all main results) were run
    during development.
